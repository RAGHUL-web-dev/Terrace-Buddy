<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Terrace Buddy</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .sidebar-link.active {
            background-color: #f0fdf4;
            color: #16a34a;
            border-right: 4px solid #16a34a;
        }
    </style>
</head>
<body class="font-sans bg-gray-50 min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-xl flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fas fa-seedling text-primary-600 text-2xl"></i>
                <span class="text-xl font-bold text-gray-800">Admin Panel</span>
            </a>
        </div>
        
        <nav class="flex-grow mt-6">
            <a href="#" onclick="switchTab('users')" id="users-link" class="sidebar-link active flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="fas fa-users mr-3 w-5"></i>
                <span class="font-medium">Manage Users</span>
            </a>
            <a href="#" onclick="switchTab('communities')" id="communities-link" class="sidebar-link flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="fas fa-comments mr-3 w-5"></i>
                <span class="font-medium">Manage Communities</span>
            </a>
            <!-- <a href="dashboard.html" class="flex items-center px-6 py-4 text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="fas fa-user mr-3 w-5"></i>
                <span class="font-medium">User Dashboard</span>
            </a> -->
        </nav>
        
        <div class="p-6 border-t">
            <button onclick="auth.logout()" class="flex items-center text-red-600 hover:text-red-700 font-medium">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col min-w-0">
        <!-- Top Navbar -->
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
            <h2 id="page-title" class="text-xl font-bold text-gray-800">User Management</h2>
            <div class="flex items-center space-x-4">
                <div class="text-right">
                    <p id="admin-name" class="text-sm font-semibold text-gray-900">Admin</p>
                    <p class="text-xs text-gray-500">Platform Administrator</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-primary-100 flex items-center justify-center">
                    <i class="fas fa-user-shield text-primary-600"></i>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="p-8 flex-grow overflow-auto">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 mb-1">Total Users</p>
                            <h3 id="stat-total-users" class="text-2xl font-bold text-gray-900">0</h3>
                        </div>
                        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-users text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 mb-1">Total Communities</p>
                            <h3 id="stat-total-communities" class="text-2xl font-bold text-gray-900">0</h3>
                        </div>
                        <div class="w-12 h-12 bg-green-50 text-green-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-comments text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 mb-1">Platform Status</p>
                            <h3 class="text-2xl font-bold text-green-600">Active</h3>
                        </div>
                        <div class="w-12 h-12 bg-green-50 text-green-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-check-circle text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table Container -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h4 id="table-title" class="text-lg font-bold text-gray-800">All Registered Users</h4>
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Search..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-300">
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead id="table-head" class="bg-gray-50 text-gray-600 uppercase text-xs font-semibold">
                            <!-- Table head content injected by JS -->
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-100">
                            <!-- Table rows injected by JS -->
                        </tbody>
                    </table>
                </div>
                
                <div id="loading" class="p-12 text-center text-gray-500">
                    <i class="fas fa-spinner fa-spin text-3xl mb-4 text-primary-600"></i>
                    <p>Loading data...</p>
                </div>
                
                <div id="no-data" class="p-12 text-center text-gray-500 hidden">
                    <i class="fas fa-folder-open text-3xl mb-4"></i>
                    <p>No records found.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Placeholder -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full">
            <h3 id="modalTitle" class="text-2xl font-bold mb-6">Edit Record</h3>
            <form id="editForm" class="space-y-4">
                <!-- Fields injected by JS -->
                <div class="flex justify-end space-x-3 mt-8">
                    <button type="button" onclick="closeModal()" class="px-6 py-2 border border-gray-300 rounded-lg font-medium text-gray-600 hover:bg-gray-50 transition duration-300">Cancel</button>
                    <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700 transition duration-300">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/utils.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    
    <script>
        let currentTab = 'users';
        let allData = [];

        async function initDashboard() {
            const user = window.auth.getCurrentUser();
            if (!user || user.role !== 'platform_admin') {
                window.location.href = 'dashboard.html';
                return;
            }
            
            document.getElementById('admin-name').textContent = user.name;
            await loadData();
        }

        async function loadData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('table-body').innerHTML = '';
            document.getElementById('no-data').classList.add('hidden');

            try {
                if (currentTab === 'users') {
                    const response = await apiRequest('/admin/users', 'GET');
                    if (response.success) {
                        allData = response.users;
                        renderUsers(allData);
                        document.getElementById('stat-total-users').textContent = allData.length;
                    }
                } else {
                    const response = await apiRequest('/admin/communities', 'GET');
                    if (response.success) {
                        allData = response.communities;
                        renderCommunities(allData);
                        document.getElementById('stat-total-communities').textContent = allData.length;
                    }
                }
            } catch (error) {
                console.error('Error loading data:', error);
                alert('Session expired or access denied');
                window.location.href = 'login.html';
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderUsers(users) {
            const head = document.getElementById('table-head');
            head.innerHTML = `
                <tr>
                    <th class="px-6 py-4">User</th>
                    <th class="px-6 py-4">Role</th>
                    <th class="px-6 py-4">Level</th>
                    <th class="px-6 py-4">Location</th>
                    <th class="px-6 py-4 text-center">Actions</th>
                </tr>
            `;

            const body = document.getElementById('table-body');
            if (users.length === 0) {
                document.getElementById('no-data').classList.remove('hidden');
                return;
            }

            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-8 h-8 rounded-full bg-primary-100 flex items-center justify-center mr-3">
                                <i class="fas fa-user text-primary-600 text-xs"></i>
                            </div>
                            <div>
                                <p class="font-medium text-gray-900">${user.name}</p>
                                <p class="text-xs text-gray-500">${user.email}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs font-semibold capitalize">${user.role.replace('_', ' ')}</span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-600 capitalize">${user.gardeningLevel}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${user.location?.city || '-'}, ${user.location?.state || '-'}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="deleteRecord('${user._id}')" class="text-red-600 hover:text-red-800 p-2" title="Delete User">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        function renderCommunities(communities) {
            const head = document.getElementById('table-head');
            head.innerHTML = `
                <tr>
                    <th class="px-6 py-4">Community</th>
                    <th class="px-6 py-4">Admin</th>
                    <th class="px-6 py-4">Members</th>
                    <th class="px-6 py-4">Type</th>
                    <th class="px-6 py-4 text-center">Actions</th>
                </tr>
            `;

            const body = document.getElementById('table-body');
            if (communities.length === 0) {
                document.getElementById('no-data').classList.remove('hidden');
                return;
            }

            communities.forEach(community => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center mr-3">
                                <i class="fas fa-seedling text-green-600 text-xs"></i>
                            </div>
                            <div>
                                <p class="font-medium text-gray-900">${community.name}</p>
                                <p class="text-xs text-gray-500">${community.location}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm font-medium text-gray-700">${community.admin?.name || 'Unknown'}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${community.members?.length || 0} members</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 bg-primary-50 text-primary-700 rounded text-xs font-semibold uppercase">${community.privacy || 'Public'}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="deleteRecord('${community._id}')" class="text-red-600 hover:text-red-800 p-2" title="Delete Community">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('users-link').classList.toggle('active', tab === 'users');
            document.getElementById('communities-link').classList.toggle('active', tab === 'communities');
            document.getElementById('page-title').textContent = tab === 'users' ? 'User Management' : 'Community Management';
            document.getElementById('table-title').textContent = tab === 'users' ? 'All Registered Users' : 'All Gardening Communities';
            loadData();
        }

        async function deleteRecord(id) {
            if (!confirm(`Are you sure you want to delete this ${currentTab.slice(0, -1)}? This action cannot be undone.`)) return;

            try {
                const endpoint = currentTab === 'users' ? `/admin/users/${id}` : `/admin/communities/${id}`;
                const response = await apiRequest(endpoint, 'DELETE');
                if (response.success) {
                    alert('Record deleted successfully');
                    loadData();
                } else {
                    alert(response.message || 'Delete failed');
                }
            } catch (error) {
                alert('An error occurred while deleting the record');
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredData = allData.filter(item => {
                const searchString = currentTab === 'users' 
                    ? `${item.name} ${item.email}`.toLowerCase()
                    : `${item.name} ${item.location}`.toLowerCase();
                return searchString.includes(query);
            });
            
            if (currentTab === 'users') renderUsers(filteredData);
            else renderCommunities(filteredData);
        });

        // Add this to your api.js or handle here if not exists
        async function apiRequest(endpoint, method = 'GET', body = null) {
            const token = localStorage.getItem('token');
            const options = {
                method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch(`http://localhost:5000/api${endpoint}`, options);
            return await response.json();
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
